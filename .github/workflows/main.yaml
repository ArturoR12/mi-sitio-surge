name: "1er Parcial: Integracion continua de Surge.sh y Github Actions"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar Surge.sh
        run: npm install -g surge

      - name: Desplegar en Surge.sh
        run: surge ./ rartu-desangles-parcial.surge.sh --token ${{ secrets.SURGE_TOKEN }} --login ${{ secrets.SURGE_LOGIN }}